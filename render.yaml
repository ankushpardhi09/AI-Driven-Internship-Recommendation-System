services:
  - type: web
    name: backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        value: https://frontend.onrender.com,http://localhost:5173
    # For sensitive values, create Render secrets and reference them in the dashboard.

  - type: static-site
    name: frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://backend.onrender.com/api
